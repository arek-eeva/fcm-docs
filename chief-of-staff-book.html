<script>
/* Forward ad attribution (utm_*, fbclid, campaign_id) into the embedded widget,
   because GHL only reads what is in the widget URL at submission. */
(function () {
  var KEEP = ['utm_source','utm_medium','utm_campaign','utm_content','utm_term','utm_id','campaign_id','fbclid','gclid'];
  var incoming = new URLSearchParams(window.location.search);
  var carry = [];
  KEEP.forEach(function (k) { if (incoming.has(k)) carry.push([k, incoming.get(k)]); });
  if (!carry.length) return;
  var f = document.getElementById('bookingFrame');
  try {
    var u = new URL(f.src);
    carry.forEach(function (pair) { u.searchParams.set(pair[0], pair[1]); });
    f.src = u.toString();
  } catch (e) { /* leave the default src */ }
})();
</script>
